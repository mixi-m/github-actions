name: Dependabot PR Review

on:
  workflow_call:
    inputs:
      runs-on:
        description: 'The type of machine to run the job on'
        required: false
        type: string
        default: 'ubuntu-latest'
      model:
        description: 'The Claude model to use'
        required: false
        type: string
        default: 'global.anthropic.claude-opus-4-7'
      region:
        description: 'AWS region to use'
        required: false
        type: string
        default: 'ap-northeast-1'
      emit-verdict:
        description: >-
          レビューコメントに自動マージ判定用のマーカーを埋め込むか。
          true の場合、判定を機械可読にするため track_progress を無効化する。
        required: false
        type: boolean
        default: false
      publish-check-run:
        description: >-
          レビュー判定を Check Run として publish するか。
          true の場合は emit-verdict を自動的に有効化する。
          利用側ジョブで checks: write の付与が必要。
        required: false
        type: boolean
        default: false
      check-name:
        description: 'publish-check-run が true のときに作成する Check Run 名'
        required: false
        type: string
        default: 'dependabot-code-review'
    secrets:
      AWS_ROLE_TO_ASSUME:
        required: true

permissions:
  actions: read
  contents: read
  id-token: write
  issues: write
  pull-requests: write
  # publish-check-run 利用時にのみ実際に使用される（呼び出し側の付与権限で上限が決まる）
  checks: write

jobs:
  review:
    name: AI review comment (dependabot)
    runs-on: ${{ inputs.runs-on }}
    if: github.event.pull_request.user.login == 'dependabot[bot]'
    permissions:
      contents: read
      pull-requests: write
      issues: write
      actions: read
      id-token: write
      checks: write
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@e7f100cf4c008499ea8adda475de1042d6975c7b # v6.2.0
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_TO_ASSUME }}
          aws-region: ${{ inputs.region }}

      - name: Claude AI Review (Comment Only)
        uses: anthropics/claude-code-action@41ea7642c1436fa0ee57aae58347904b71a5af27 # v1.0.137
        with:
          use_bedrock: true
          # 判定マーカーを機械解析する場合は、専用コメントに確実に残すため
          # track_progress を無効化する（既定では従来通り有効）。
          track_progress: ${{ !(inputs.emit-verdict || inputs.publish-check-run) }}
          github_token: ${{ secrets.GITHUB_TOKEN }}
          allowed_bots: "*"
          prompt: |
            **Language: 日本語で回答**

            PR #${{ github.event.pull_request.number }} は Dependabot によるバージョンアップです。
            自動マージは行いません。破壊的変更の有無と実使用箇所への影響を分析し、
            人間のレビュアーへの情報提供としてコメントを残してください。

            ## 分析手順

            1. `gh pr view ${{ github.event.pull_request.number }}` で PR 本文・リリースノートを確認する
            2. `gh pr diff ${{ github.event.pull_request.number }}` で変更内容を確認する
            3. 更新された依存関係をこのリポジトリで実際に使用している箇所を `Grep` や `Read` で確認する
            4. 破壊的変更と実使用箇所への影響を評価する

            ## レビューコメント

            以下のテンプレートで `gh pr comment ${{ github.event.pull_request.number }} -b` を使ってコメントしてください:

            ```
            # Dependabot PR レビュー

            ## 対象
            <!-- パッケージ名@旧バージョン → 新バージョン -->

            ## サマリー
            <!-- 変更内容の概要 -->

            ## 破壊的変更
            - 状況: <!-- あり / なし / 確認不可 -->
            - 詳細: <!-- 破壊的変更の内容 -->

            ## 実使用箇所への影響
            <!-- 影響がある場合: ファイルパス:行番号、使用対象、変更内容、影響評価 -->
            <!-- 影響がない場合: 「影響なし」 -->

            ## 推奨アクション
            <!-- レビュアーへの推奨事項 -->
            ```
            ${{ (inputs.emit-verdict || inputs.publish-check-run) && 'なお自動マージ判定のため、このレビューコメントの先頭に必ず次の HTML コメント行を含めてください（画面には表示されません）。1行目: <!-- dependabot-code-review -->。続けて、破壊的変更がなく実使用箇所への悪影響もない場合は <!-- dependabot-code-verdict:approved -->、いずれかに該当する/確認できない場合は <!-- dependabot-code-verdict:changes-requested --> を付与してください。' || '' }}

            このPRは承認しないでください。コメントのみ残してください。
          claude_args: |
            --model ${{ inputs.model }}
            --allowedTools "Read,Glob,Grep,Bash(gh pr comment:*),Bash(gh pr diff:*),Bash(gh pr view:*)"
            --max-turns 20

      # publish-check-run が true のときのみ、レビュー判定を Check Run として
      # publish する。判定はコメントに埋め込まれた検証マーカーから導出する。
      # 承認可マーカーがあれば success、それ以外（マーカー無しを含む）は neutral。
      - name: Publish review verdict check run
        if: ${{ inputs.publish-check-run }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
          CHECK_NAME: ${{ inputs.check-name }}
        run: |
          set -euo pipefail

          CONCLUSION=neutral
          COMMENT_ID=$(gh api --paginate \
            "repos/${GITHUB_REPOSITORY}/issues/${PR_NUMBER}/comments?per_page=100" \
            --jq '.[] | select(.user.login == "github-actions[bot]" and (.body // "" | contains("<!-- dependabot-code-review -->"))) | .id' \
            | tail -n 1)
          if [ -n "$COMMENT_ID" ]; then
            BODY=$(gh api "repos/${GITHUB_REPOSITORY}/issues/comments/${COMMENT_ID}" --jq '.body // ""')
            case "$BODY" in *'<!-- dependabot-code-verdict:approved -->'*) CONCLUSION=success ;; esac
          fi

          echo "${CHECK_NAME} conclusion: ${CONCLUSION}"
          gh api -X POST "repos/${GITHUB_REPOSITORY}/check-runs" \
            -f name="${CHECK_NAME}" \
            -f head_sha="${HEAD_SHA}" \
            -f status='completed' \
            -f conclusion="${CONCLUSION}" \
            -f 'output[title]=Dependabot code review' \
            -f "output[summary]=Dependabot code review 判定: ${CONCLUSION}" \
            > /dev/null
